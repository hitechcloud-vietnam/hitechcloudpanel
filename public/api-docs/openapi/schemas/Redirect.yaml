type: object
properties:
  id:
    type: integer
    example: 1
  server_id:
    type: integer
    example: 1
  site_id:
    type: integer
    example: 1
  from:
    type: string
    example: 'example.com'
  to:
    type: string
    example: 'www.example.com'
  mode:
    type: string
    example: '301'
  status:
    type: string
    enum: ['ready', 'installing', 'installation_failed', 'deleting']
    example: 'ready'
  status_color:
    type: string
    enum: ['success', 'warning', 'danger', 'gray']
    example: 'success'
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
