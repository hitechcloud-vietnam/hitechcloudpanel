type: object
properties:
  id:
    type: integer
    example: 1
  server_id:
    type: integer
    example: 1
  site_id:
    type: integer
    nullable: true
    example: 1
  name:
    type: string
    example: 'queue-worker'
  command:
    type: string
    example: 'php artisan queue:work'
  user:
    type: string
    example: 'www-data'
  auto_start:
    type: boolean
    example: true
  auto_restart:
    type: boolean
    example: true
  numprocs:
    type: integer
    example: 1
  status:
    type: string
    enum: ['ready', 'installing', 'installation_failed', 'deleting']
    example: 'ready'
  status_color:
    type: string
    enum: ['success', 'warning', 'danger', 'gray']
    example: 'success'
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
