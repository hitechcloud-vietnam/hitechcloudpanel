type: object
properties:
  id:
    type: integer
    example: 1
  user_id:
    type: integer
    nullable: true
    example: 1
  project_id:
    type: integer
    example: 1
  project_name:
    type: string
    nullable: true
    example: 'my-project'
  email:
    type: string
    nullable: true
    example: 'user@example.com'
  role:
    type: string
    enum: ['owner', 'admin', 'developer', 'viewer']
    example: 'owner'
  type:
    type: string
    enum: ['user', 'invitation']
    example: 'user'
