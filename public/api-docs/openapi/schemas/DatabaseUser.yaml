type: object
properties:
  id:
    type: integer
    example: 1
  server_id:
    type: integer
    example: 1
  username:
    type: string
    example: 'db_user'
  databases:
    type: array
    items:
      type: string
    example: ['my_database', 'another_database']
  host:
    type: string
    example: 'localhost'
  permission:
    type: string
    example: 'all'
  status:
    type: string
    enum: ['ready', 'installing', 'installation_failed', 'deleting']
    example: 'ready'
  status_color:
    type: string
    enum: ['success', 'warning', 'danger', 'gray']
    example: 'success'
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
