paths:
  /api/projects/{project}/servers/{server}/sites:
    get:
      summary: List sites
      description: Get all sites for a server
      tags:
        - Sites
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: List of sites
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '/api-docs/openapi/schemas/PaginatedResponse.yaml'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '/api-docs/openapi/schemas/Site.yaml'
              example:
                data:
                  - id: 1
                    server_id: 1
                    server:
                      id: 1
                      name: 'production-server'
                      ip: '192.168.1.100'
                    source_control_id: 1
                    type: 'laravel'
                    type_data: {}
                    domain: 'example.com'
                    aliases: ['www.example.com']
                    web_directory: 'public'
                    webserver: 'nginx'
                    path: '/home/www-data/example.com'
                    php_version: '8.2'
                    repository: 'https://github.com/user/repo.git'
                    branch: 'main'
                    status: 'ready'
                    status_color: 'success'
                    auto_deploy: true
                    port: 80
                    user: 'www-data'
                    url: 'https://example.com'
                    force_ssl: true
                    progress: 100
                    features: ['ssl', 'backups', 'monitoring']
                    modern_deployment: true
                    created_at: '2024-01-01T00:00:00.000000Z'
                    updated_at: '2024-01-01T00:00:00.000000Z'
                links:
                  first: 'http://localhost/api/projects/1/servers/1/sites?page=1'
                  last: 'http://localhost/api/projects/1/servers/1/sites?page=10'
                  prev: null
                  next: 'http://localhost/api/projects/1/servers/1/sites?page=2'
                meta:
                  current_page: 1
                  from: 1
                  last_page: 10
                  per_page: 25
                  to: 25
                  total: 250
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Project or server not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'

    post:
      summary: Create site
      description: Create a new site
      tags:
        - Sites
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - domain
              properties:
                type:
                  type: string
                  description: Site type
                  example: 'laravel'
                domain:
                  type: string
                  format: hostname
                  description: Site domain
                  example: 'example.com'
                aliases:
                  type: array
                  items:
                    type: string
                    format: hostname
                  description: Domain aliases
                  example: ['www.example.com', 'app.example.com']
                user:
                  type: string
                  pattern: '^[a-z_][a-z0-9_-]*[a-z0-9]$'
                  minLength: 3
                  maxLength: 32
                  description: System user for the site
                  example: 'www-data'
                repository:
                  type: string
                  format: uri
                  description: Git repository URL
                  example: 'https://github.com/user/repo.git'
                branch:
                  type: string
                  description: Git branch
                  example: 'main'
                source_control_id:
                  type: integer
                  description: Source control provider ID
                  example: 1
            example:
              type: 'laravel'
              domain: 'example.com'
              aliases: ['www.example.com']
              user: 'www-data'
              repository: 'https://github.com/user/repo.git'
              branch: 'main'
              source_control_id: 1
      responses:
        '201':
          description: Site created successfully
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/Site.yaml'
              example:
                id: 1
                server_id: 1
                server:
                  id: 1
                  name: 'production-server'
                  ip: '192.168.1.100'
                source_control_id: 1
                type: 'laravel'
                type_data: {}
                domain: 'example.com'
                aliases: ['www.example.com']
                web_directory: 'public'
                webserver: 'nginx'
                path: '/home/www-data/example.com'
                php_version: '8.2'
                repository: 'https://github.com/user/repo.git'
                branch: 'main'
                status: 'installing'
                status_color: 'warning'
                auto_deploy: true
                port: 80
                user: 'www-data'
                url: 'https://example.com'
                force_ssl: true
                progress: 0
                features: []
                modern_deployment: true
                created_at: '2024-01-01T00:00:00.000000Z'
                updated_at: '2024-01-01T00:00:00.000000Z'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Project or server not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ValidationError.yaml'
              example:
                message: 'The given data was invalid.'
                errors:
                  type: ['The type field is required.']
                  domain: ['The domain field is required.']

