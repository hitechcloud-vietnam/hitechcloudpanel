paths:
  /api/projects/{project}/servers/{server}/sites/{site}/ssl:
    get:
      summary: List SSL certificates
      description: Get all SSL certificates for a site
      tags:
        - SSL
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
        - name: site
          in: path
          required: true
          description: Site ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: List of SSL certificates
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '/api-docs/openapi/schemas/PaginatedResponse.yaml'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '/api-docs/openapi/schemas/SSL.yaml'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Project, server, or site not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'

    post:
      summary: Create SSL certificate
      description: Create a new SSL certificate for a site
      tags:
        - SSL
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
        - name: site
          in: path
          required: true
          description: Site ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - domains
              properties:
                type:
                  type: string
                  enum: ['letsencrypt', 'custom']
                  description: SSL certificate type
                  example: 'letsencrypt'
                domains:
                  type: array
                  items:
                    type: string
                  description: Domains for the certificate
                  example: ['example.com', 'www.example.com']
            example:
              type: 'letsencrypt'
              domains: ['example.com', 'www.example.com']
      responses:
        '201':
          description: SSL certificate created successfully
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/SSL.yaml'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Project, server, or site not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ValidationError.yaml'

  /api/projects/{project}/servers/{server}/sites/{site}/ssl/{ssl}:
    get:
      summary: Get SSL certificate
      description: Get a specific SSL certificate by ID
      tags:
        - SSL
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
        - name: site
          in: path
          required: true
          description: Site ID
          schema:
            type: integer
            example: 1
        - name: ssl
          in: path
          required: true
          description: SSL certificate ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: SSL certificate details
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/SSL.yaml'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: SSL certificate not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'

    delete:
      summary: Delete SSL certificate
      description: Delete an SSL certificate
      tags:
        - SSL
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
        - name: site
          in: path
          required: true
          description: Site ID
          schema:
            type: integer
            example: 1
        - name: ssl
          in: path
          required: true
          description: SSL certificate ID
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: SSL certificate deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: SSL certificate not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'

