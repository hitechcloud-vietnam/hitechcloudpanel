paths:
  /api/projects/{project}/servers/{server}/services:
    get:
      summary: List services
      description: Get all services for a server
      tags:
        - Services
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: List of services
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '/api-docs/openapi/schemas/PaginatedResponse.yaml'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '/api-docs/openapi/schemas/Service.yaml'
              example:
                data:
                  - id: 1
                    server_id: 1
                    type: 'php'
                    type_data: {}
                    config_paths: ['/etc/php/8.2/fpm/php.ini']
                    name: 'php'
                    version: '8.2'
                    installed_version: '8.2.0'
                    unit: 'php8.2-fpm'
                    status: 'ready'
                    status_color: 'success'
                    icon: 'fab fa-php'
                    is_default: true
                    created_at: '2024-01-01T00:00:00.000000Z'
                    updated_at: '2024-01-01T00:00:00.000000Z'
                links:
                  first: 'http://localhost/api/projects/1/servers/1/services?page=1'
                  last: 'http://localhost/api/projects/1/servers/1/services?page=10'
                  prev: null
                  next: 'http://localhost/api/projects/1/servers/1/services?page=2'
                meta:
                  current_page: 1
                  from: 1
                  last_page: 10
                  per_page: 25
                  to: 25
                  total: 250
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Project or server not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'

  /api/projects/{project}/servers/{server}/services/{service}:
    get:
      summary: Get service
      description: Get a specific service by ID
      tags:
        - Services
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
        - name: service
          in: path
          required: true
          description: Service ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Service details
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/Service.yaml'
              example:
                id: 1
                server_id: 1
                type: 'php'
                type_data: {}
                config_paths: ['/etc/php/8.2/fpm/php.ini']
                name: 'php'
                version: '8.2'
                installed_version: '8.2.0'
                unit: 'php8.2-fpm'
                status: 'ready'
                status_color: 'success'
                icon: 'fab fa-php'
                is_default: true
                created_at: '2024-01-01T00:00:00.000000Z'
                updated_at: '2024-01-01T00:00:00.000000Z'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Service not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'

    delete:
      summary: Uninstall service
      description: Uninstall a service from the server
      tags:
        - Services
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
        - name: service
          in: path
          required: true
          description: Service ID
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: Service uninstalled successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
