paths:
  /api/storage-providers:
    get:
      summary: List user's storage providers
      description: Get all storage providers for the authenticated user
      tags:
        - User Storage Providers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of storage providers
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '/api-docs/openapi/schemas/PaginatedResponse.yaml'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '/api-docs/openapi/schemas/StorageProvider.yaml'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'

    post:
      summary: Create storage provider
      description: Create a new storage provider for the authenticated user
      tags:
        - User Storage Providers
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - provider
                - credentials
              properties:
                name:
                  type: string
                  description: Storage provider name
                  example: 'AWS S3'
                provider:
                  type: string
                  enum: ['s3', 'local', 'ftp']
                  description: Storage provider type
                  example: 's3'
                credentials:
                  type: object
                  description: Provider-specific credentials
                  example:
                    key: 'AKIAIOSFODNN7EXAMPLE'
                    secret: 'wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY'
                    region: 'us-east-1'
                global:
                  type: boolean
                  description: Whether this provider should be available globally (not tied to current project)
                  example: false
      responses:
        '201':
          description: Storage provider created successfully
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/StorageProvider.yaml'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ValidationError.yaml'

  /api/storage-providers/{storageProvider}:
    get:
      summary: Get storage provider
      description: Get a specific storage provider by ID
      tags:
        - User Storage Providers
      security:
        - bearerAuth: []
      parameters:
        - name: storageProvider
          in: path
          required: true
          description: Storage provider ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Storage provider details
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/StorageProvider.yaml'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Storage provider not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'

    put:
      summary: Update storage provider
      description: Update a storage provider
      tags:
        - User Storage Providers
      security:
        - bearerAuth: []
      parameters:
        - name: storageProvider
          in: path
          required: true
          description: Storage provider ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Storage provider name
                  example: 'AWS S3'
                global:
                  type: boolean
                  description: Whether this provider should be available globally (not tied to current project)
                  example: false
      responses:
        '200':
          description: Storage provider updated successfully
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/StorageProvider.yaml'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Storage provider not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ValidationError.yaml'

    delete:
      summary: Delete storage provider
      description: Delete a storage provider
      tags:
        - User Storage Providers
      security:
        - bearerAuth: []
      parameters:
        - name: storageProvider
          in: path
          required: true
          description: Storage provider ID
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: Storage provider deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Storage provider not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
