          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Project or server not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'

    post:
      summary: Create database user
      description: Create a new database user
      tags:
        - Database Users
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  pattern: '^[a-zA-Z0-9_-]+$'
                  description: Database username (alphanumeric, hyphens, underscores only)
                  example: 'db_user'
                password:
                  type: string
                  minLength: 6
                  description: Database user password
                  example: 'secure_password'
                permission:
                  type: string
                  enum: ['read', 'write', 'admin']
                  description: User permission level
                  default: 'admin'
                  example: 'admin'
                remote:
                  type: boolean
                  description: Whether this is a remote user
                  example: false
                host:
                  type: string
                  description: Host for remote users (required if remote is true)
                  example: 'localhost'
            example:
              username: 'db_user'
              password: 'secure_password'
              permission: 'admin'
              remote: false
      responses:
        '201':
          description: Database user created successfully
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/DatabaseUser.yaml'
              example:
                id: 1
                database_id: 1
                name: 'db_user'
                password: 'secure_password'
                permissions: ['SELECT', 'INSERT', 'UPDATE', 'DELETE']
                status: 'ready'
                status_color: 'success'
                created_at: '2024-01-01T00:00:00.000000Z'
                updated_at: '2024-01-01T00:00:00.000000Z'
        '401':
