paths:
  /api/projects/{project}/servers/{server}/databases:
    get:
      summary: List databases
      description: Get all databases for a server
      tags:
        - Databases
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: List of databases
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '/api-docs/openapi/schemas/PaginatedResponse.yaml'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '/api-docs/openapi/schemas/Database.yaml'
              example:
                data:
                  - id: 1
                    server_id: 1
                    name: 'my_database'
                    collation: 'utf8mb4_unicode_ci'
                    charset: 'utf8mb4'
                    status: 'ready'
                    status_color: 'success'
                    created_at: '2024-01-01T00:00:00.000000Z'
                    updated_at: '2024-01-01T00:00:00.000000Z'
                links:
                  first: 'http://localhost/api/projects/1/servers/1/databases?page=1'
                  last: 'http://localhost/api/projects/1/servers/1/databases?page=10'
                  prev: null
                  next: 'http://localhost/api/projects/1/servers/1/databases?page=2'
                meta:
                  current_page: 1
                  from: 1
                  last_page: 10
                  per_page: 25
                  to: 25
                  total: 250
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Project or server not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'

    post:
      summary: Create database
      description: Create a new database
      tags:
        - Databases
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - charset
                - collation
              properties:
                name:
                  type: string
                  pattern: '^[a-zA-Z0-9_-]+$'
                  description: Database name (alphanumeric, hyphens, underscores only)
                  example: 'my_database'
                charset:
                  type: string
                  description: Database character set
                  example: 'utf8mb4'
                collation:
                  type: string
                  description: Database collation
                  example: 'utf8mb4_unicode_ci'
                user:
                  type: boolean
                  description: Whether to create a database user
                  example: true
                existing_user_id:
                  type: integer
                  description: Existing database user ID to link (required if user is true)
                  example: 1
            example:
              name: 'my_database'
              charset: 'utf8mb4'
              collation: 'utf8mb4_unicode_ci'
              user: true
              existing_user_id: 1
      responses:
        '201':
          description: Database created successfully
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/Database.yaml'
              example:
                id: 1
                server_id: 1
                name: 'my_database'
                collation: 'utf8mb4_unicode_ci'
                charset: 'utf8mb4'
                status: 'ready'
                status_color: 'success'
                created_at: '2024-01-01T00:00:00.000000Z'
                updated_at: '2024-01-01T00:00:00.000000Z'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Project or server not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ValidationError.yaml'
              example:
                message: 'The given data was invalid.'
                errors:
                  name: ['The name field is required.']
                  charset: ['The charset field is required.']
                  collation: ['The collation field is required.']

