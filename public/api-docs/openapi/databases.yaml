            application/json:
              schema:
                allOf:
                  - $ref: '/api-docs/openapi/schemas/PaginatedResponse.yaml'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '/api-docs/openapi/schemas/Database.yaml'
              example:
                data:
                  - id: 1
                    database_id: 1
                    name: 'db_user'
                    password: 'secure_password'
                    permissions: ['SELECT', 'INSERT', 'UPDATE', 'DELETE']
                    status: 'ready'
                    status_color: 'success'
                    created_at: '2024-01-01T00:00:00.000000Z'
                    updated_at: '2024-01-01T00:00:00.000000Z'
                links:
                  first: 'http://localhost/api/projects/1/servers/1/database-users?page=1'
                  last: 'http://localhost/api/projects/1/servers/1/database-users?page=10'
                  prev: null
                  next: 'http://localhost/api/projects/1/servers/1/database-users?page=2'
