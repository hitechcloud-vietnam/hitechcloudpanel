paths:
  /api/projects:
    get:
      summary: List projects
      description: Get all projects for the authenticated user
      tags:
        - Projects
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '/api-docs/openapi/schemas/PaginatedResponse.yaml'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '/api-docs/openapi/schemas/Project.yaml'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'

    post:
      summary: Create project
      description: Create a new project
      tags:
        - Projects
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  maxLength: 255
                  pattern: '^[a-z0-9_-]+$'
                  description: Project name (lowercase, alphanumeric, hyphens, underscores only)
                  example: 'my-project'
            example:
              name: 'my-new-project'
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/Project.yaml'
              example:
                id: 1
                name: 'my-new-project'
                role: 'owner'
                created_at: '2024-01-01T00:00:00.000000Z'
                updated_at: '2024-01-01T00:00:00.000000Z'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ValidationError.yaml'
              example:
                message: 'The given data was invalid.'
                errors:
                  name: ['The name field is required.']

  /api/projects/{project}:
    get:
      summary: Get project
      description: Get a specific project by ID
      tags:
        - Projects
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/Project.yaml'
              example:
                id: 1
                name: 'my-project'
                role: 'owner'
                created_at: '2024-01-01T00:00:00.000000Z'
                updated_at: '2024-01-01T00:00:00.000000Z'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'

    put:
      summary: Update project
      description: Update a project's details
      tags:
        - Projects
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  maxLength: 255
                  pattern: '^[a-z0-9_-]+$'
                  description: Project name (lowercase, alphanumeric, hyphens, underscores only)
                  example: 'updated-project-name'
            example:
              name: 'updated-project-name'
      responses:
        '200':
          description: Project updated successfully
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/Project.yaml'
              example:
                id: 1
                name: 'updated-project-name'
                role: 'owner'
                created_at: '2024-01-01T00:00:00.000000Z'
                updated_at: '2024-01-01T12:00:00.000000Z'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ValidationError.yaml'
              example:
                message: 'The given data was invalid.'
                errors:
                  name: ['The name field is required.']

    delete:
      summary: Delete project
      description: Delete a project (cannot delete last project or current project)
      tags:
        - Projects
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: Project deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ValidationError.yaml'
              example:
                message: 'The given data was invalid.'
                errors:
                  name: ['Cannot delete the last project.']

