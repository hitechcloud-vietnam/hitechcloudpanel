          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: Server deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
