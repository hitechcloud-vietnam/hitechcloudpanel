paths:
  /api/projects/{project}/servers/{server}/firewall-rules:
    get:
      summary: List firewall rules
      description: Get all firewall rules for a server
      tags:
        - Firewall Rules
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: List of firewall rules
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '/api-docs/openapi/schemas/PaginatedResponse.yaml'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '/api-docs/openapi/schemas/FirewallRule.yaml'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Project or server not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'

    post:
      summary: Create firewall rule
      description: Create a new firewall rule for a server
      tags:
        - Firewall Rules
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - port
                - from
              properties:
                name:
                  type: string
                  description: Rule name
                  example: 'SSH Access'
                port:
                  type: string
                  description: Port number or range
                  example: '22'
                from:
                  type: string
                  description: Source IP or CIDR
                  example: '0.0.0.0/0'
            example:
              name: 'SSH Access'
              port: '22'
              from: '0.0.0.0/0'
      responses:
        '201':
          description: Firewall rule created successfully
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/FirewallRule.yaml'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Project or server not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ValidationError.yaml'

  /api/projects/{project}/servers/{server}/firewall-rules/{firewallRule}:
    get:
      summary: Get firewall rule
      description: Get a specific firewall rule by ID
      tags:
        - Firewall Rules
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
        - name: firewallRule
          in: path
          required: true
          description: Firewall Rule ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Firewall rule details
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/FirewallRule.yaml'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Firewall rule not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'

    delete:
      summary: Delete firewall rule
      description: Delete a firewall rule
      tags:
        - Firewall Rules
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
        - name: firewallRule
          in: path
          required: true
          description: Firewall Rule ID
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: Firewall rule deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Firewall rule not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'

