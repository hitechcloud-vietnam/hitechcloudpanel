paths:
  /api/projects/{project}/servers/{server}/workers:
    get:
      summary: List workers
      description: Get all workers for a server
      tags:
        - Workers
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: List of workers
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '/api-docs/openapi/schemas/PaginatedResponse.yaml'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '/api-docs/openapi/schemas/Worker.yaml'
              example:
                data:
                  - id: 1
                    server_id: 1
                    site_id: 1
                    name: 'queue-worker'
                    command: 'php artisan queue:work'
                    user: 'www-data'
                    auto_start: true
                    auto_restart: true
                    numprocs: 1
                    status: 'ready'
                    status_color: 'success'
                    created_at: '2024-01-01T00:00:00.000000Z'
                    updated_at: '2024-01-01T00:00:00.000000Z'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Project or server not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'

    post:
      summary: Create worker
      description: Create a new worker for a server
      tags:
        - Workers
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - command
                - user
              properties:
                name:
                  type: string
                  description: Worker name
                  example: 'queue-worker'
                command:
                  type: string
                  description: Command to execute
                  example: 'php artisan queue:work'
                user:
                  type: string
                  description: User to run the command as
                  example: 'www-data'
                site_id:
                  type: integer
                  nullable: true
                  description: Site ID (optional)
                  example: 1
                auto_start:
                  type: boolean
                  description: Start automatically
                  default: true
                  example: true
                auto_restart:
                  type: boolean
                  description: Restart automatically
                  default: true
                  example: true
                numprocs:
                  type: integer
                  description: Number of processes
                  default: 1
                  example: 1
            example:
              name: 'queue-worker'
              command: 'php artisan queue:work'
              user: 'www-data'
              site_id: 1
              auto_start: true
              auto_restart: true
              numprocs: 1
      responses:
        '201':
          description: Worker created successfully
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/Worker.yaml'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Project or server not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ValidationError.yaml'

  /api/projects/{project}/servers/{server}/workers/{worker}:
    get:
      summary: Get worker
      description: Get a specific worker by ID
      tags:
        - Workers
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
        - name: worker
          in: path
          required: true
          description: Worker ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Worker details
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/Worker.yaml'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Worker not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'

    delete:
      summary: Delete worker
      description: Delete a worker
      tags:
        - Workers
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
        - name: worker
          in: path
          required: true
          description: Worker ID
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: Worker deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Worker not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
