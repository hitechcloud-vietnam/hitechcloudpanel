paths:
  /api/projects/{project}/servers/{server}/cron-jobs:
    get:
      summary: List cron jobs
      description: Get all cron jobs for a server
      tags:
        - Cron Jobs
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: List of cron jobs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '/api-docs/openapi/schemas/PaginatedResponse.yaml'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '/api-docs/openapi/schemas/CronJob.yaml'
              example:
                data:
                  - id: 1
                    server_id: 1
                    site_id: null
                    command: 'php artisan schedule:run'
                    user: 'www-data'
                    frequency: '* * * * *'
                    status: 'ready'
                    status_color: 'success'
                    created_at: '2024-01-01T00:00:00.000000Z'
                    updated_at: '2024-01-01T00:00:00.000000Z'
                links:
                  first: 'http://localhost/api/projects/1/servers/1/cron-jobs?page=1'
                  last: 'http://localhost/api/projects/1/servers/1/cron-jobs?page=10'
                  prev: null
                  next: 'http://localhost/api/projects/1/servers/1/cron-jobs?page=2'
                meta:
                  current_page: 1
                  from: 1
                  last_page: 10
                  per_page: 25
                  to: 25
                  total: 250
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Project or server not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'

    post:
      summary: Create cron job
      description: Create a new cron job for a server
      tags:
        - Cron Jobs
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: server
          in: path
          required: true
          description: Server ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - command
                - user
                - frequency
              properties:
                command:
                  type: string
                  description: Command to execute
                  example: 'php artisan schedule:run'
                user:
                  type: string
                  description: User to run the command as
                  example: 'www-data'
                frequency:
                  type: string
                  description: Cron frequency expression
                  example: '* * * * *'
                site_id:
                  type: integer
                  nullable: true
                  description: Site ID (optional)
                  example: 1
            example:
              command: 'php artisan schedule:run'
              user: 'www-data'
              frequency: '* * * * *'
              site_id: 1
      responses:
        '201':
          description: Cron job created successfully
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/CronJob.yaml'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Project or server not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ValidationError.yaml'

