  /api/projects/{project}/server-providers/{serverProvider}/regions:
    get:
      summary: Get server provider regions
      description: "DEPRECATED: Use /api/server-providers/{serverProvider}/regions instead. This endpoint will be removed in a future version."
      deprecated: true
      tags:
        - Server Providers
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: serverProvider
          in: path
          required: true
          description: Server provider ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: List of available regions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      description: Region identifier
                      example: 'nyc1'
                    name:
                      type: string
                      description: Region name
                      example: 'New York 1'
                    country:
                      type: string
                      description: Country code
                      example: 'US'
                    available:
                      type: boolean
                      description: Whether the region is available
                      example: true
              example:
                - id: 'nyc1'
                  name: 'New York 1'
                  country: 'US'
                  available: true
                - id: 'sfo1'
                  name: 'San Francisco 1'
                  country: 'US'
                  available: true
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Server provider not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'

  /api/projects/{project}/server-providers/{serverProvider}/regions/{region}/plans:
    get:
      summary: Get server provider plans
      description: "DEPRECATED: Use /api/server-providers/{serverProvider}/regions/{region}/plans instead. This endpoint will be removed in a future version."
      deprecated: true
      tags:
        - Server Providers
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: serverProvider
          in: path
          required: true
          description: Server provider ID
          schema:
            type: integer
            example: 1
        - name: region
          in: path
          required: true
          description: Region identifier
          schema:
            type: string
            example: 'nyc1'
      responses:
        '200':
          description: List of available plans
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      description: Plan identifier
                      example: 's-1vcpu-1gb'
                    name:
                      type: string
                      description: Plan name
                      example: 'Basic'
                    memory:
                      type: integer
                      description: Memory in MB
                      example: 1024
                    vcpus:
                      type: integer
                      description: Number of vCPUs
                      example: 1
                    disk:
                      type: integer
                      description: Disk size in GB
                      example: 25
                    price_monthly:
                      type: number
                      format: float
                      description: Monthly price in USD
                      example: 5.0
                    price_hourly:
                      type: number
                      format: float
                      description: Hourly price in USD
                      example: 0.007
                    available:
                      type: boolean
                      description: Whether the plan is available
                      example: true
              example:
                - id: 's-1vcpu-1gb'
                  name: 'Basic'
                  memory: 1024
                  vcpus: 1
                  disk: 25
                  price_monthly: 5.0
                  price_hourly: 0.007
                  available: true
                - id: 's-1vcpu-2gb'
                  name: 'Standard'
                  memory: 2048
                  vcpus: 1
                  disk: 50
                  price_monthly: 10.0
                  price_hourly: 0.014
                  available: true
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Server provider or region not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
