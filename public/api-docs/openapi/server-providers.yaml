paths:
  /api/projects/{project}/server-providers:
    get:
      summary: List server providers
      description: "DEPRECATED: Use /api/server-providers instead. This endpoint will be removed in a future version."
      deprecated: true
      tags:
        - Server Providers
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: List of server providers
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '/api-docs/openapi/schemas/PaginatedResponse.yaml'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '/api-docs/openapi/schemas/ServerProvider.yaml'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'

    post:
      summary: Create server provider
      description: "DEPRECATED: Use /api/server-providers instead. This endpoint will be removed in a future version."
      deprecated: true
      tags:
        - Server Providers
      security:
        - bearerAuth: []
      parameters:
        - name: project
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - type
                - credentials
              properties:
                name:
                  type: string
                  description: Server provider name
                  example: 'DigitalOcean'
                type:
                  type: string
                  enum: ['aws', 'hetzner', 'digitalocean', 'linode', 'vultr']
                  description: Server provider type
                  example: 'digitalocean'
                credentials:
                  type: object
                  description: Provider-specific credentials
                  example:
                    token: 'dop_v1_xxxxxxxxxxxx'
      responses:
        '201':
          description: Server provider created successfully
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ServerProvider.yaml'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ErrorResponse.yaml'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '/api-docs/openapi/schemas/ValidationError.yaml'

