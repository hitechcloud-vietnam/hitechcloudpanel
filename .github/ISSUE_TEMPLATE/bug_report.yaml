name: 🐞 HiTechCloud Panel Bug Report
description: Report a bug or issue in your HiTechCloud Panel instance to help us improve
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## 🧩 HiTechCloud Panel Bug Report
        Please complete all required fields so we can reproduce and fix the issue quickly.  
        Fields marked with * are required.

  - type: dropdown
    id: installation_type
    attributes:
      label: Installation Type *
      description: How did you install your HiTechCloud Panel instance?
      options:
        - Local
        - VPS
        - Docker
    validations:
      required: true

  - type: input
    id: hittechcloud_version
    attributes:
      label: HiTechCloud Panel Version *
      description: Hover over the HiTechCloud Panel icon in your dashboard to see your version.
      placeholder: e.g., 0.6.2
    validations:
      required: true

  - type: textarea
    id: bug_description
    attributes:
      label: Describe the Bug *
      description: A clear and concise description of what the bug is.
      placeholder: The deployment process hangs after connecting to the server.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce *
      description: Step-by-step guide to reproduce the issue.
      placeholder: |
        1. Go to 'Projects'
        2. Click on 'Deploy'
        3. Observe the spinner never stops
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior *
      description: What did you expect to happen instead?
      placeholder: The deployment should complete successfully and display a success message.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs *
      description: |
        Please provide logs from:
        - `HiTechCloud Panel Logs` (bottom left corner of your dashboard)
        - `Horizon Dashboard` (for failed jobs or queue errors)
        Paste relevant sections only.
      placeholder: |
        [Paste log output here]
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots or screen recordings to explain the issue.
      placeholder: Drag and drop your screenshots here.

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any extra details, configurations, or related issues.
      placeholder: Any other context about the problem.