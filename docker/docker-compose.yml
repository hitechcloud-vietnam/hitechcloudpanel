services:
    hitechcloudpanel:
        build:
            context: ../
            dockerfile: docker/Dockerfile
        environment:
            NAME: "hitechcloudpanel"
            EMAIL: "hitechcloudpanel@example.com"
            PASSWORD: "password"
            APP_KEY: "base64:UodiJrx3DkcMlizmoimNlDn+yd4q5f2VbkBay19rJwM="
            APP_PORT: 8000
            APP_URL: "http://localhost:8000"
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-8000}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        volumes:
            - "hitechcloudpanel-storage:/var/www/html/storage"
volumes:
    hitechcloudpanel-storage:
        driver: local
